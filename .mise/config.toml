[tools]
go = "1.26.3"

[tasks.tfbackend]
description = "Generate Terraform backend configs from 1Password"
hide = true
run = [
  "op inject -i terraform/work-repositories/backend.hcl.tpl -o terraform/work-repositories/backend.hcl",
  "op inject -i terraform/fork-repositories/backend.hcl.tpl -o terraform/fork-repositories/backend.hcl"
]

[tasks.tfinit]
description = "Generate backend configs from 1Password and run Terraform init"
run = [
  "mise run tfbackend",
  "mise run tfinit:local"
]

[tasks."tfinit:local"]
description = "Run Terraform init with existing local backend configs"
hide = true
run = [
  "terraform -chdir=terraform/work-repositories init -backend-config=backend.hcl",
  "terraform -chdir=terraform/fork-repositories init -backend-config=backend.hcl"
]

[tasks.tfcheck]
description = "Check Terraform formatting and validate root modules"
run = [
  { task = "tfcheck:require-init" },
  "terraform fmt -check -recursive",
  "terraform -chdir=terraform/work-repositories validate",
  "terraform -chdir=terraform/fork-repositories validate"
]

[tasks."tfcheck:require-init"]
hide = true
run = '''
#!/usr/bin/env bash
set -euo pipefail

for root_module in terraform/work-repositories terraform/fork-repositories; do
  if [ ! -f "$root_module/.terraform/terraform.tfstate" ] || [ ! -f "$root_module/.terraform/modules/modules.json" ] || [ ! -d "$root_module/.terraform/providers" ]; then
    printf '%s\n' 'Terraform root modules are not initialized. Run `mise run tfinit` before `mise run tfcheck`.' >&2
    exit 1
  fi
done
'''

[tasks."work:plan"]
description = "Run Terraform plan for managed working repositories"
run = ["terraform -chdir=terraform/work-repositories plan"]

[tasks."work:apply"]
description = "Run Terraform apply for managed working repositories"
run = ["terraform -chdir=terraform/work-repositories apply"]

[tasks."work:add-repo"]
description = "Add a managed working repository to Terraform locals"
run = ["go -C scripts/add-work-repository run . ../../terraform/work-repositories/locals.tf"]

[tasks."work:codeql"]
description = "Reconcile CodeQL default setup for managed working repositories"
run = ["go -C scripts/reconcile-codeql run . --owner y-writings ../../terraform/work-repositories/locals.tf"]

[tasks."fork:plan"]
description = "Run Terraform plan for managed fork repositories"
run = ["terraform -chdir=terraform/fork-repositories plan"]

[tasks."fork:apply"]
description = "Run Terraform apply for managed fork repositories"
run = ["terraform -chdir=terraform/fork-repositories apply"]
